<svg width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgb(59,130,246);stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:rgb(139,92,246);stop-opacity:0.2" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#grad)"/>

  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  </pattern>
  <rect width="400" height="300" fill="url(#grid)"/>

  <!-- Icon -->
  <g transform="translate(200, 150)">
    <!-- Flask/Research icon -->
    <circle cx="0" cy="0" r="40" fill="rgba(59,130,246,0.3)" />
    <path d="M -15 -20 L -15 -10 L -10 10 L 10 10 L 15 -10 L 15 -20 Z"
          fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
    <circle cx="0" cy="5" r="3" fill="rgba(255,255,255,0.6)"/>
  </g>

  <!-- Text -->
  <text x="200" y="220" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-family="system-ui" font-size="14" font-weight="600">
    Research Project
  </text>
</svg>
